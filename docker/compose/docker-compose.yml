version: '3.8'

services:
  audio-transcription:
    build: 
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: audio-transcription-app
    ports:
      - "5000:5000"
    volumes:
      # 音声ファイルと結果を永続化（/volume2/data/meeting-minutes-byc配下）
      - /volume2/data/meeting-minutes-byc/uploads:/tmp/uploads
      - /volume2/data/meeting-minutes-byc/transcripts:/tmp/transcripts
      - /volume2/data/meeting-minutes-byc/logs:/app/logs
      # 設定ファイル
      - ../../meeting-minutes/config:/app/meeting-minutes/config
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    restart: unless-stopped
    # GPUを使用する場合（NASでGPU対応している場合）
